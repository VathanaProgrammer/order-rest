name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies and build test
        run: |
          npm install
          npm run build
          
      - name: Copy Files to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: 52.221.243.62
          username: ubuntu
          key: ${{ secrets.ORDER_EC2_SSH_KEY }}
          source: "."
          target: "~/deploy-order-ui"
          
      - name: Build and Run with Docker Compose on EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 52.221.243.62
          username: ubuntu
          key: ${{ secrets.ORDER_EC2_SSH_KEY }}
          script: |
            cd ~/deploy-order-ui
            docker rm -f order-rest || true
            docker compose down --remove-orphans || true
            docker compose up -d --build
            docker image prune -f

      - name: Send Telegram Notification (Success)
        uses: appleboy/telegram-action@master
        if: success()
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🎉 SUCCESS: The Order Frontend is LIVE! 🥑✨
            Application: order-rest
            Author: ${{ github.actor }} 🦸‍♂️
            Commit: ${{ github.event.head_commit.message }}
            Grab a beer, team! 🍻

      - name: Send Telegram Notification (Failure)
        uses: appleboy/telegram-action@master
        if: failure()
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚨 FAILURE: The Order Frontend Deployment Failed! 🔥😭
            Application: order-rest
            Author: ${{ github.actor }} 👀
            Commit: ${{ github.event.head_commit.message }}
            Fix this mess: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Coffee is for closers, no coffee for you! ☕🚫
